name: Bug report
description: Report reproducible behavior using synthetic data only
title: "bug: "
labels: ["bug", "ai:managed", "status:triage"]
assignees: ["KD7CAO"]
type: bug
body:
  - type: markdown
    attributes:
      value: "Do not include real incident data, protected channel data, personal information, credentials, keys, certificates, private endpoints, or operational connection information."
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction steps
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit or version
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Suggested priority
      description: Maintainers make the final priority decision.
      options:
        - P0 - Operational or security emergency
        - P1 - High impact
        - P2 - Normal
        - P3 - Low impact
      default: 2
    validations:
      required: true
