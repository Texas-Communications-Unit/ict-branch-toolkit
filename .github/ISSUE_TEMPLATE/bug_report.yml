name: Bug report
description: Report reproducible behavior using synthetic data only
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Do not include real incident data, protected channel data, personal information, credentials, keys, certificates, private endpoints, or operational connection information."
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction steps
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit or version
    validations:
      required: true

