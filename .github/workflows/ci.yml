name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:17-3.5-alpine
        env:
          POSTGRES_DB: ict_toolkit
          POSTGRES_USER: ict_toolkit
          POSTGRES_PASSWORD: synthetic-ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ict_toolkit -d ict_toolkit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    defaults:
      run:
        working-directory: backend
    env:
      DJANGO_SECRET_KEY: synthetic-ci-secret-key
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_ENABLE_GIS: "true"
      DATABASE_URL: postgis://ict_toolkit:synthetic-ci-password@127.0.0.1:5432/ict_toolkit
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: sudo apt-get update && sudo apt-get install -y gdal-bin libgdal-dev
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff format --check .
      - run: ruff check .
      - run: python manage.py check
      - run: python manage.py makemigrations --check --dry-run
      - run: python manage.py migrate --noinput
      - run: python manage.py shell -c "from django.db import connection; c=connection.cursor(); c.execute('SELECT PostGIS_Version()'); print(c.fetchone()[0])"
      - run: pytest
      - run: python manage.py spectacular --file openapi.generated.yaml --validate
      - run: diff --strip-trailing-cr openapi.yaml openapi.generated.yaml
      - run: pip-audit

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm exec vitest run --coverage
      - run: pnpm build
      - run: pnpm audit --audit-level high

  end-to-end:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  containers:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: synthetic-ci-password
      DJANGO_SECRET_KEY: synthetic-ci-secret-key
      DJANGO_ALLOWED_HOSTS: localhost,backend
      DJANGO_CORS_ALLOWED_ORIGINS: https://localhost
      DJANGO_SUPERUSER_USERNAME: synthetic-admin
      DJANGO_SUPERUSER_EMAIL: synthetic-admin@example.invalid
      DJANGO_SUPERUSER_PASSWORD: synthetic-ci-admin-password
    steps:
      - uses: actions/checkout@v7
      - run: docker compose config --quiet
      - run: docker compose build
      - run: docker compose -f compose.production.yaml config --quiet
      - run: docker compose -f compose.production.yaml build
