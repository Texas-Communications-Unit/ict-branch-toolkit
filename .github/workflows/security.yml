name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "23 9 * * 1"

concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.event_name }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Scan Git history with Gitleaks
        run: >-
          docker run --rm
          -v "${{ github.workspace }}:/repo"
          ghcr.io/gitleaks/gitleaks:v8.30.0
          detect --source=/repo --redact --no-banner

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip pip-audit
      - run: pip install -e ".[dev]" && pip-audit
        working-directory: backend
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm audit --audit-level high
        working-directory: frontend
