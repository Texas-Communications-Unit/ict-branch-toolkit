name: Deploy shared test

on:
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: shared-test-deployment
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy approved main commit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: shared-test

    steps:
      - name: Check out approved commit
        uses: actions/checkout@v7

      - name: Resolve current main commit
        id: resolve_main
        run: |
          git fetch origin main:refs/remotes/origin/main
          echo "sha=$(git rev-parse refs/remotes/origin/main)" >> "$GITHUB_OUTPUT"

      - name: Validate required secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_KNOWN_HOSTS"
          test -n "$DEPLOY_PORT"
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_USER"

      - name: Configure SSH
        env:
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$HOME/.ssh/deploy_key"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/deploy_key"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Upload deployment script
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          remote_script=".cache/ict-branch-toolkit/deploy-${GITHUB_RUN_ID}.sh"
          ssh \
            -i "$HOME/.ssh/deploy_key" \
            -p "$DEPLOY_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "install -d -m 700 .cache/ict-branch-toolkit && cat > '$remote_script' && chmod 700 '$remote_script'" \
            < scripts/deploy-shared-test.sh

      - name: Deploy exact main commit
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          # Use the commit resolved just before this job ran (post-approval),
          # not github.sha, which is fixed at dispatch time. Required-reviewer
          # approval can take a long time, during which main may advance; the
          # remote script refuses anything other than the current origin/main,
          # so deploying a stale dispatch-time sha would otherwise always fail.
          MAIN_SHA: ${{ steps.resolve_main.outputs.sha }}
        run: |
          remote_script=".cache/ict-branch-toolkit/deploy-${GITHUB_RUN_ID}.sh"
          ssh \
            -i "$HOME/.ssh/deploy_key" \
            -p "$DEPLOY_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "bash '$remote_script' '$MAIN_SHA'"

      - name: Remove remote deployment script
        if: always()
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          remote_script=".cache/ict-branch-toolkit/deploy-${GITHUB_RUN_ID}.sh"
          ssh \
            -i "$HOME/.ssh/deploy_key" \
            -p "$DEPLOY_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "rm -f '$remote_script'"

      - name: Remove temporary key
        if: always()
        run: rm -f "$HOME/.ssh/deploy_key"
