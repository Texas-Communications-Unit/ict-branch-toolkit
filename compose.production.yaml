name: ict-branch-toolkit

services:
  db:
    image: postgis/postgis:17-3.5-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ict_toolkit}
      POSTGRES_USER: ${POSTGRES_USER:-ict_toolkit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the deployment environment file}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in the deployment environment file}
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?Set DJANGO_ALLOWED_HOSTS in the deployment environment file}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:?Set DJANGO_CORS_ALLOWED_ORIGINS in the deployment environment file}
      DJANGO_ENABLE_GIS: "true"
      DATABASE_URL: postgis://${POSTGRES_USER:-ict_toolkit}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ict_toolkit}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:?Set DJANGO_SUPERUSER_USERNAME in the deployment environment file}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:?Set DJANGO_SUPERUSER_EMAIL in the deployment environment file}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:?Set DJANGO_SUPERUSER_PASSWORD in the deployment environment file}
      ICT_IDENTITY_PROVIDER: ${ICT_IDENTITY_PROVIDER:-local}
      ICT_ROLE_POLICY_OVERRIDES: ${ICT_ROLE_POLICY_OVERRIDES:-{}}
      ICT_APPROVED_REFERENCE_IMPORTS: ${ICT_APPROVED_REFERENCE_IMPORTS:-[]}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; request = urllib.request.Request('http://127.0.0.1:8000/api/health/', headers={'Host': 'backend'}); urllib.request.urlopen(request, timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_BASE_URL: ""
        VITE_MAP_STYLE_URL: ${VITE_MAP_STYLE_URL:-}
        VITE_MAP_TILE_URL: ${VITE_MAP_TILE_URL:-}
        VITE_MAP_PROVIDER_ID: ${VITE_MAP_PROVIDER_ID:-}
        VITE_MAP_PROVIDER_NAME: ${VITE_MAP_PROVIDER_NAME:-}
        VITE_MAP_ATTRIBUTION_TEXT: ${VITE_MAP_ATTRIBUTION_TEXT:-}
        VITE_MAP_ATTRIBUTION_URL: ${VITE_MAP_ATTRIBUTION_URL:-}
        VITE_MAP_LICENSE_NAME: ${VITE_MAP_LICENSE_NAME:-}
        VITE_MAP_LICENSE_URL: ${VITE_MAP_LICENSE_URL:-}
        VITE_MAP_TERMS_URL: ${VITE_MAP_TERMS_URL:-}
        VITE_MAP_PRIVACY_URL: ${VITE_MAP_PRIVACY_URL:-}
        VITE_MAP_REPORT_ISSUE_URL: ${VITE_MAP_REPORT_ISSUE_URL:-}
        VITE_MAP_CONTACT_URL: ${VITE_MAP_CONTACT_URL:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_BIND_ADDRESS:-127.0.0.1}:${APP_PORT:-8088}:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - internal

networks:
  internal:

volumes:
  postgres-data:
