name: ict-branch-toolkit

services:
  db:
    image: postgis/postgis:17-3.5-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ict_toolkit}
      POSTGRES_USER: ${POSTGRES_USER:-ict_toolkit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-only-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-unsafe-compose-development-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      DJANGO_ENABLE_GIS: ${DJANGO_ENABLE_GIS:-true}
      DATABASE_URL: ${DATABASE_URL:-postgis://ict_toolkit:local-only-password@db:5432/ict_toolkit}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@example.invalid}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-change-me-before-use}
      ICT_IDENTITY_PROVIDER: ${ICT_IDENTITY_PROVIDER:-local}
      ICT_ROLE_POLICY_OVERRIDES: ${ICT_ROLE_POLICY_OVERRIDES:-{}}
      ICT_APPROVED_REFERENCE_IMPORTS: ${ICT_APPROVED_REFERENCE_IMPORTS:-[]}
    command: ["/app/scripts/start-backend.sh"]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      target: development
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_MAP_STYLE_URL: ${VITE_MAP_STYLE_URL:-}
    command: ["pnpm", "dev", "--host", "0.0.0.0"]
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"

volumes:
  postgres-data:
