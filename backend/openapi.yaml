components:
  schemas:
    AuthToken:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        token:
          type: string
          readOnly: true
      required:
      - password
      - token
      - username
    ChannelImport:
      type: object
      properties:
        dry_run:
          type: boolean
          default: true
        source:
          $ref: '#/components/schemas/ImportSource'
        release:
          $ref: '#/components/schemas/ImportRelease'
        conventional_channels:
          type: array
          items:
            $ref: '#/components/schemas/ImportConventionalChannel'
        trunked_talkgroups:
          type: array
          items:
            $ref: '#/components/schemas/ImportTrunkedTalkgroup'
      required:
      - release
      - source
    ChannelImportResponse:
      type: object
      properties:
        valid:
          type: boolean
        dry_run:
          type: boolean
        approval_required:
          type: boolean
        would_create:
          type: object
          additionalProperties:
            type: integer
        created:
          type: object
          additionalProperties:
            type: integer
        import_id:
          type: string
          format: uuid
        release_id:
          type: string
          format: uuid
        errors:
          type: array
          items:
            $ref: '#/components/schemas/StructuredImportError'
      required:
      - dry_run
      - errors
      - valid
    ConventionalChannel:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        release:
          allOf:
          - $ref: '#/components/schemas/ResourceRelease'
          readOnly: true
        identifier:
          type: string
          maxLength: 80
        name:
          type: string
          maxLength: 160
        band:
          type: string
          maxLength: 40
        rx_frequency_hz:
          type: integer
          maximum: 10000000000
          minimum: 1
          format: int64
        tx_frequency_hz:
          type: integer
          maximum: 10000000000
          minimum: 1
          format: int64
          nullable: true
        bandwidth_hz:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
        mode:
          $ref: '#/components/schemas/ModeEnum'
        rx_squelch:
          type: string
          maxLength: 40
        tx_squelch:
          type: string
          maxLength: 40
        restrictions:
          type: string
        notes:
          type: string
        is_active:
          type: boolean
      required:
      - id
      - identifier
      - mode
      - name
      - release
      - rx_frequency_hz
    CurrentUser:
      type: object
      properties:
        username:
          type: string
          readOnly: true
        display_name:
          type: string
          readOnly: true
        role:
          type: string
          readOnly: true
        permissions:
          type: array
          items:
            type: string
          readOnly: true
      required:
      - display_name
      - permissions
      - role
      - username
    EffectiveStatusEnum:
      enum:
      - draft
      - effective
      - superseded
      type: string
      description: |-
        * `draft` - Draft
        * `effective` - Effective
        * `superseded` - Superseded
    ImportConventionalChannel:
      type: object
      properties:
        identifier:
          type: string
          maxLength: 80
        name:
          type: string
          maxLength: 160
        band:
          type: string
          maxLength: 40
        rx_frequency_hz:
          type: integer
          maximum: 10000000000
          minimum: 1
          format: int64
        tx_frequency_hz:
          type: integer
          maximum: 10000000000
          minimum: 1
          format: int64
          nullable: true
        bandwidth_hz:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
        mode:
          $ref: '#/components/schemas/ModeEnum'
        rx_squelch:
          type: string
          maxLength: 40
        tx_squelch:
          type: string
          maxLength: 40
        restrictions:
          type: string
        notes:
          type: string
        is_active:
          type: boolean
      required:
      - identifier
      - mode
      - name
      - rx_frequency_hz
    ImportRelease:
      type: object
      properties:
        version:
          type: string
          maxLength: 80
        released_on:
          type: string
          format: date
          nullable: true
        effective_status:
          $ref: '#/components/schemas/EffectiveStatusEnum'
        content_sha256:
          type: string
          pattern: ^[0-9a-f]{64}$
      required:
      - content_sha256
      - effective_status
      - version
    ImportSource:
      type: object
      properties:
        slug:
          type: string
          maxLength: 80
          pattern: ^[-a-zA-Z0-9_]+$
        name:
          type: string
          maxLength: 200
        source_type:
          $ref: '#/components/schemas/SourceTypeEnum'
        authoritative_url:
          oneOf:
          - type: string
            format: uri
            maxLength: 500
          - type: string
            maxLength: 0
      required:
      - name
      - slug
      - source_type
    ImportTrunkedTalkgroup:
      type: object
      properties:
        identifier:
          type: string
          maxLength: 80
        name:
          type: string
          maxLength: 160
        system_name:
          type: string
          maxLength: 160
        talkgroup_id:
          type: integer
          maximum: 16777215
          minimum: 0
        mode:
          type: string
          maxLength: 40
        restrictions:
          type: string
        notes:
          type: string
        is_active:
          type: boolean
      required:
      - identifier
      - name
      - system_name
      - talkgroup_id
    Incident:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 200
        incident_number:
          type: string
          maxLength: 80
        status:
          $ref: '#/components/schemas/StatusEnum'
        operational_periods:
          type: array
          items:
            $ref: '#/components/schemas/OperationalPeriod'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        archived_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        permissions:
          type: array
          items:
            type: string
          readOnly: true
      required:
      - archived_at
      - created_at
      - id
      - name
      - operational_periods
      - permissions
      - updated_at
    IncidentMembership:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        incident:
          type: string
          format: uuid
        user:
          type: integer
        username:
          type: string
          readOnly: true
        role:
          $ref: '#/components/schemas/RoleEnum'
        is_active:
          type: boolean
        assigned_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - assigned_at
      - id
      - incident
      - role
      - updated_at
      - user
      - username
    ModeEnum:
      enum:
      - analog_fm
      - p25
      - dmr
      - nxdn
      - other
      type: string
      description: |-
